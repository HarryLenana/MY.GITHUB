<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 30px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: #3b82f6;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Hi, I'm Harry 👋</h1>
        <p>
            Passionate about technology, networking, and building practical solutions.
            Welcome to my first GitHub project.
        </p>

        <a href="https://github.com" class="btn">Visit GitHub</a>
    </div>

</body>

</html>
